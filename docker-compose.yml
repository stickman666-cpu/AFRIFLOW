services:
  postgres:
    image: postgres:16-alpine
    container_name: afriflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: afriflow
      POSTGRES_USER: afriflow
      POSTGRES_PASSWORD: afriflow_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afriflow -d afriflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: afriflow-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://afriflow:afriflow_password@postgres:5432/afriflow
      JWT_SECRET: local-docker-secret-change-me
      PUBLIC_APP_URL: http://localhost:4000
      CORS_ORIGIN: http://localhost:4000
    ports:
      - "4000:4000"
    command: sh -c "npm run db:migrate && npm start"

volumes:
  postgres-data:
