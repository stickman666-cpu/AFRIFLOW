name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: afriflow
          POSTGRES_USER: afriflow
          POSTGRES_PASSWORD: afriflow_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U afriflow -d afriflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://afriflow:afriflow_password@localhost:5432/afriflow
      JWT_SECRET: ci-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Check JavaScript syntax
        run: npm run check

      - name: Run database migration
        run: npm run db:migrate

      - name: Check database connection
        run: npm run db:check
