services:
  - type: web
    name: afriflow-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run db:migrate && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: afriflow-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: afriflow-postgres
    plan: starter
    databaseName: afriflow
    user: afriflow
